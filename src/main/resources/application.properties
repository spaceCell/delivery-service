server.port=8083

spring.application.name=delivery-service
spring.datasource.url=jdbc:h2:mem:deliverydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.ignoreExceptions=java.lang.IllegalArgumentException,com.example.deliveryservice.common.ResourceNotFoundException

logging.level.io.github.resilience4j=DEBUG
